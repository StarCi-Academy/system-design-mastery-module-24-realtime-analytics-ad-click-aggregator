# Defaults committed so the service runs out-of-the-box under Compose; only the
# broker address is overridden by the environment.
server.port=3001
server.address=0.0.0.0

kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.topic=${KAFKA_TOPIC:ad-clicks}
kafka.client-id=${KAFKA_CLIENT_ID:count-consumer}
# Stable group id: offsets are committed per group, so a restart resumes from
# the last committed offset instead of replaying the whole log.
kafka.group-id=${KAFKA_GROUP_ID:ad-click-counter}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:ad-click-counter}
# First run with no committed offset starts at the beginning; afterwards the
# committed offset wins.
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

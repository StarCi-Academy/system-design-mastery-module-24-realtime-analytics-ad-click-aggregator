# Every default is committed so the service runs out-of-the-box under Docker
# Compose; Compose only overrides the broker address via the env var below.
server.port=3000
server.address=0.0.0.0

kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.topic=${KAFKA_TOPIC:ad-clicks}
kafka.client-id=${KAFKA_CLIENT_ID:ingest-api}

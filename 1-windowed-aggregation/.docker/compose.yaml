name: windowed-aggregation

services:
  # Single-node Kafka broker in KRaft mode (no Zookeeper).
  kafka:
    image: apache/kafka:3.8.0
    container_name: windowed-aggregation-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - windowed-aggregation-network

  # ClickHouse analytics database: stores aggregated click counts per window.
  # HTTP interface on port 8123 (used by @clickhouse/client).
  # Credentials: user=clickhouse password=clickhouse (dev environment).
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: windowed-aggregation-clickhouse
    ports:
      - "8123:8123"
    environment:
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DB: default
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      # Use the built-in clickhouse-client for the health check instead of wget/curl.
      test: ["CMD-SHELL", "clickhouse-client --user clickhouse --password clickhouse --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - windowed-aggregation-network

  # HTTP producer: POST /clicks appends a click envelope (with eventTime) to
  # the Kafka topic.
  ingest-api:
    build:
      context: ../ingest-api/0-typescript
      dockerfile: Dockerfile
    container_name: windowed-aggregation-ingest-api
    ports:
      - "3000:3000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ad-clicks
      KAFKA_CLIENT_ID: ingest-api
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - windowed-aggregation-network

  # Windowed aggregation consumer: reads ad-clicks, buckets by 1-minute
  # tumbling window and flushes counts to ClickHouse.
  aggregator:
    build:
      context: ../aggregator/0-typescript
      dockerfile: Dockerfile
    container_name: windowed-aggregation-aggregator
    ports:
      - "3002:3002"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ad-clicks
      KAFKA_CLIENT_ID: aggregator
      KAFKA_GROUP_ID: ad-click-aggregator
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: default
      CLICKHOUSE_USERNAME: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - windowed-aggregation-network

networks:
  windowed-aggregation-network:
    name: windowed-aggregation-network
    driver: bridge
